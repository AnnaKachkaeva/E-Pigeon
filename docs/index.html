<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
    <title>E-Pigeon with script</title>
    <style>
        body {
            max-width: 600px;
            margin: 50px auto;
            font-family: Arial, sans-serif;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
        }

        .pigeon {
            font-size: 80px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="pigeon">🕊️</div>

<h1>E-Pigeon</h1>

<p>Send a pigeon to someone.</p>

<label>Recipient</label>
<input type="text" id="recipient" placeholder="@username" />

<br><br>

<label>Message</label>
<textarea id="message"></textarea>

<br>

<button onclick="sendPigeon()">
    Send Pigeon
</button>

<script>
function sendPigeon() {

    const recipient =
        document.getElementById("recipient").value;

    const message =
        document.getElementById("message").value;

    localStorage.setItem(
        "latestPigeon",
        JSON.stringify({
            recipient,
            message,
            createdAt: new Date().toISOString()
        })
    );

    alert("🕊️ Pigeon launched!");

    window.location.href = "inbox.html";
}
</script>


<div id="user"></div>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
const user = tg.initDataUnsafe.user;
document.getElementById("user").innerText =
    JSON.stringify(user, null, 2);
console.log(user);
</script>

<h1>Pigeons</h1>

<div id="pigeons"></div>

<script>
async function loadPigeons() {
    const response = await fetch(
        "http://127.0.0.1:8000/pigeons"
    );
    const pigeons = await response.json();
    document.getElementById("pigeons").innerText =
        JSON.stringify(pigeons, null, 2);
}
loadPigeons();
</script>

</body>
</html>
